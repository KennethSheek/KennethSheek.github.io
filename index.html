<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenneth Sheek Technology | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            /* Seamless blend background with the logo image, with a subtle grain texture */
            background-color: #F4F7FB;
            background-image: 
                linear-gradient(rgba(0,0,0,0.01) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.01) 1px, transparent 1px);
            background-size: 20px 20px, 20px 20px;
            background-position: center;
            color: #1e293b;
            height: 100vh;
            overflow: hidden; /* Prevents all scrolling */
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Top Header (Logo Left, Link Right) */
        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 2rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo-container {
            width: 320px; 
            height: auto;
        }

        .logo-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        .header-nav a {
            text-decoration: none;
            color: #1e293b;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: color 0.3s ease;
            padding: 0.5rem 1rem;
            border-radius: 8px;
        }

        .header-nav a:hover {
            color: #0d3b66;
            background-color: rgba(0, 0, 0, 0.03);
        }

        /* Center Content (Currently Blank) */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0 2rem;
        }

        /* Centered Bottom Footer */
        footer {
            position: absolute;
            bottom: 2rem;
            width: 100%;
            display: flex;
            justify-content: center; 
            padding: 0 2rem;
            font-size: 0.95rem;
            font-weight: 400;
            color: #64748b;
            z-index: 10;
        }

        .footer-line {
            display: flex;
            align-items: center;
            flex-wrap: wrap; /* Allows items to wrap on very small screens */
            justify-content: center;
            gap: 1.5rem;
        }

        .footer-line a {
            color: #64748b;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer-line a:hover {
            color: #0d3b66;
        }

        .footer-separator {
            color: #cbd5e1;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            header {
                padding: 1.5rem;
            }
            .logo-container {
                width: 220px;
            }
            .header-nav a {
                font-size: 1rem;
                padding: 0.5rem;
            }
            footer {
                bottom: 1.5rem;
                font-size: 0.85rem;
            }
            .footer-line {
                gap: 1rem;
            }
        }

        @media (max-width: 480px) {
            .footer-line {
                gap: 0.5rem;
            }
            .footer-separator {
                display: none; /* Hides the pipe separators if the screen is too small and items stack */
            }
            .footer-line span, .footer-line a {
                width: 100%;
                text-align: center;
                margin-bottom: 0.25rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="ks-logo.png" alt="Kenneth Sheek Technology Logo">
        </div>
        <nav class="header-nav">
            <a href="resume.html">Resume</a>
        </nav>
    </header>

    <main>
        </main>

    <footer>
        <div class="footer-line">
            <span>Clemmons, NC</span>
            <span class="footer-separator">|</span>
            <a href="mailto:KennethSheek@outlook.com">KennethSheek@outlook.com</a>
            <span class="footer-separator">|</span>
            <a href="https://www.linkedin.com/in/kenneth-sheek/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        </div>
    </footer>

</body>
</html>
