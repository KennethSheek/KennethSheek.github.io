<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenneth Sheek Technology | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            /* Seamless blend background with the logo image, with a subtle grain texture (reminder to fix logo with alpha transparency later)*/
            background-color: #F4F7FB;
            background-image: 
                linear-gradient(rgba(0,0,0,0.01) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.01) 1px, transparent 1px);
            background-size: 20px 20px, 20px 20px;
            background-position: center;
            color: #1e293b;
            
            /* Changed to dynamic viewport height and natural flex stacking to fix mobile clipping */
            min-height: 100vh;
            min-height: 100dvh; 
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Prevents scrolling */
        }

        /* Top Header*/
        header {
            width: 100%;
            padding: 2rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo-container {
            width: 320px; 
            height: auto;
        }

        .logo-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        .header-nav a {
            text-decoration: none;
            color: #1e293b;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: color 0.3s ease;
            padding: 0.5rem 1rem;
            border-radius: 8px;
        }

        .header-nav a:hover {
            color: #0d3b66;
            background-color: rgba(0, 0, 0, 0.03);
        }

        /* Center Content */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0 2rem;
        }

        .construction-card {
            text-align: center;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 3rem 4rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            animation: float 6s ease-in-out infinite;
        }

        .construction-card h2 {
            font-size: 2.5rem;
            font-weight: 600;
            color: #0d3b66;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        .construction-card p {
            font-size: 1.1rem;
            color: #64748b;
            font-weight: 300;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        /* Centered Footer */
        footer {
            width: 100%;
            display: flex;
            justify-content: center; 
            padding: 2rem;
            font-size: 0.95rem;
            font-weight: 400;
            color: #64748b;
            z-index: 10;
        }

        .footer-line {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap; 
            gap: 1.5rem;
        }

        .footer-line a {
            color: #64748b;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer-line a:hover {
            color: #0d3b66;
        }

        .footer-separator {
            color: #cbd5e1;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            header {
                padding: 1.5rem;
            }
            .logo-container {
                width: 220px;
            }
            .header-nav a {
                font-size: 1rem;
                padding: 0.5rem;
            }
            .construction-card {
                padding: 2rem;
            }
            .construction-card h2 {
                font-size: 1.75rem;
            }
            footer {
                padding: 1.5rem;
                font-size: 0.85rem;
            }
            .footer-line {
                gap: 1rem;
            }
        }

        @media (max-width: 480px) {
            .footer-line {
                flex-direction: column; /* Stacks items neatly on small screens */
                gap: 0.5rem;
            }
            .footer-separator {
                display: none; 
            }
            .footer-line span, .footer-line a {
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="ks-logo.png" alt="Kenneth Sheek Technology Logo">
        </div>
        <nav class="header-nav">
            <a href="resume.html">Resume</a>
        </nav>
    </header>

    <main>
        <div class="construction-card">
            <h2>Under Construction</h2>
            <p>New projects and updates coming soon.</p>
        </div>
    </main>

    <footer>
        <div class="footer-line">
            <span>Clemmons, NC</span>
            <span class="footer-separator">|</span>
            <a href="mailto:KennethSheek@outlook.com">KennethSheek@outlook.com</a>
            <span class="footer-separator">|</span>
            <a href="https://www.linkedin.com/in/kenneth-sheek/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        </div>
    </footer>

</body>
</html>
