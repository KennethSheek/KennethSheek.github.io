<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenneth Sheek Technology | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            /* Seamless blend background with the logo image, with a subtle grain texture */
            background-color: #F4F7FB;
            background-image: 
                linear-gradient(rgba(0,0,0,0.01) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.01) 1px, transparent 1px);
            background-size: 20px 20px, 20px 20px;
            background-position: center;
            color: #1e293b;
            height: 100vh;
            overflow: hidden; /* Prevents all scrolling */
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Top Left Logo */
        header {
            position: absolute;
            top: 2rem;
            left: 2rem;
            z-index: 10;
        }

        .logo-container {
            width: 320px; 
            height: auto;
        }

        .logo-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Center Content with large buttons */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0 2rem;
        }

        .nav-links {
            display: flex;
            gap: 3rem;
            max-width: 1000px;
            width: 100%;
            justify-content: center;
        }

        /* Simplified Card Styles */
        .nav-card {
            position: relative;
            width: 260px;
            height: 380px;
            border-radius: 20px;
            text-decoration: none;
            overflow: hidden; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: all 0.4s ease;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.8);
            background: #ffffff;
        }

        .nav-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
        }

        /* Image handling */
        .nav-card img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            transition: transform 0.5s ease;
        }

        .nav-card:hover img {
            transform: scale(1.05); /* Subtle zoom effect on hover */
        }

        /* Centered Floating Text Pill */
        .card-title {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            background: rgba(255, 255, 255, 0.85);
            padding: 0.75rem 2rem;
            border-radius: 50px;
            font-size: 1.25rem;
            font-weight: 600;
            color: #0d3b66; /* Deep blue to compliment the logo */
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
        }

        .nav-card:hover .card-title {
            background: #ffffff;
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
        }

        /* Centered Bottom Footer */
        footer {
            position: absolute;
            bottom: 2rem;
            width: 100%;
            display: flex;
            justify-content: center; 
            padding: 0 2rem;
            font-size: 0.95rem;
            font-weight: 400;
            color: #64748b;
            z-index: 10;
        }

        .footer-line {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .footer-line a {
            color: #64748b;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer-line a:hover {
            color: #0d3b66;
        }

        .footer-separator {
            color: #cbd5e1;
        }

        /* Mobile Responsiveness */
        @media (max-width: 1000px) {
            .nav-links {
                gap: 2rem;
            }
            .nav-card {
                width: 220px;
                height: 320px;
            }
        }

        @media (max-width: 768px) {
            header {
                top: 1.5rem;
                left: 1.5rem;
            }
            .logo-container {
                width: 220px;
            }
            
            .nav-links {
                flex-direction: column;
                gap: 1.25rem;
                width: 100%;
                max-width: 350px;
            }

            .nav-card {
                width: 100%;
                height: 120px; /* Horizontal boxes on mobile to prevent scrolling */
            }

            .nav-card:hover {
                transform: translateY(-4px); 
            }

            footer {
                bottom: 1.5rem;
                font-size: 0.85rem;
            }
            .footer-line {
                gap: 1rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="KS logo.png" alt="Kenneth Sheek Technology Logo">
        </div>
    </header>

    <main>
        <div class="nav-links">
            <a href="resume.html" class="nav-card">
                <img src="Resume.png" alt="Resume Preview">
                <h2 class="card-title">Resume</h2>
            </a>
            
            <a href="projects.html" class="nav-card">
                <img src="Projects.png" alt="Projects Preview">
                <h2 class="card-title">Projects</h2>
            </a>
            
            <a href="links.html" class="nav-card">
                <img src="Links.png" alt="Links Preview">
                <h2 class="card-title">Links</h2>
            </a>
        </div>
    </main>

    <footer>
        <div class="footer-line">
            <span>Clemmons, NC</span>
            <span class="footer-separator">|</span>
            <a href="mailto:KennethSheek@outlook.com">KennethSheek@outlook.com</a>
        </div>
    </footer>

</body>
</html>
