<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenneth C. Sheek | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            /* A subtle, visually interesting animated gradient background */
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #111827, #312e81);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #f8fafc;
            height: 100vh;
            overflow: hidden; /* Prevents all scrolling */
            display: flex;
            flex-direction: column;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Top Left Name */
        header {
            position: absolute;
            top: 2rem;
            left: 2rem;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: #e2e8f0;
        }

        /* Center Links Container */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0 2rem;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
        }

        /* Glassmorphism Button Styles */
        .nav-links a {
            text-decoration: none;
            color: #f8fafc;
            font-size: 1.25rem;
            font-weight: 400;
            padding: 1rem 2.5rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .nav-links a:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Bottom Footer */
        footer {
            position: absolute;
            bottom: 2rem;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 2rem;
            font-size: 0.9rem;
            font-weight: 300;
            color: #94a3b8;
        }

        footer a {
            color: #94a3b8;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        footer a:hover {
            color: #f8fafc;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            header {
                top: 1.5rem;
                left: 1.5rem;
            }
            
            .nav-links {
                flex-direction: column;
                gap: 1.5rem;
                width: 100%;
                max-width: 300px;
            }

            .nav-links a {
                text-align: center;
                width: 100%;
            }

            footer {
                flex-direction: column;
                align-items: center;
                gap: 0.5rem;
                bottom: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Kenneth C. Sheek</h1>
    </header>

    <main>
        <div class="nav-links">
            <a href="resume.html">Resume</a>
            <a href="projects.html">Projects</a>
            <a href="links.html">Links</a>
        </div>
    </main>

    <footer>
        <div class="location">Clemmons, NC</div>
        <div class="email">
            <a href="mailto:KennethSheek@outlook.com">KennethSheek@outlook.com</a>
        </div>
    </footer>

</body>
</html>
